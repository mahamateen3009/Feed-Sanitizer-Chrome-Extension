<!DOCTYPE html>
<html>

<head>
  <meta charset="utf-8">
  <style>
    body {
      width: 390px;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      padding: 12px;
      margin: 0;
      background-color: #f9f9f9;
    }

    h3 {
      color: #333;
      margin-top: 0;
    }

    .filter-container {
      display: flex;
      justify-content: space-between;
      margin-bottom: 10px;
    }

    .filter-btn {
      flex: 1;
      margin: 0 2px;
      padding: 6px 2px;
      font-size: 10px;
      font-weight: bold;
      border: 1px solid #ccc;
      border-radius: 4px;
      cursor: pointer;
      background: #fff;
    }

    #showShorts {
      border-bottom: 3px solid #dc3545;
    }

    #showVideos {
      border-bottom: 3px solid #007bff;
    }

    #showSearches {
      border-bottom: 3px solid #d97706;
    }

    /* Selection Utilities Styling */
    .selection-container {
      display: flex;
      justify-content: space-between;
      margin-bottom: 10px;
    }

    .selection-btn {
      flex: 1;
      margin: 0 2px;
      padding: 6px 2px;
      font-size: 10px;
      font-weight: bold;
      border: 1px solid #ddd;
      border-radius: 4px;
      cursor: pointer;
      background: #eaeaea;
      color: #444;
      transition: background 0.2s;
    }

    .selection-btn:hover {
      background: #dddddd;
    }

    #videoList {
      max-height: 250px;
      overflow-y: auto;
      border: 1px solid #ddd;
      background: #fff;
      border-radius: 4px;
      padding: 5px;
    }

    .video-item {
      display: flex;
      align-items: flex-start;
      padding: 6px;
      border-bottom: 1px solid #eee;
    }

    .video-item:last-child {
      border-bottom: none;
    }

    .video-item input {
      margin-top: 3px;
      cursor: pointer;
    }

    .video-text {
      font-size: 12px;
      margin-left: 8px;
      color: #444;
      line-height: 1.3;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      width: 290px;
    }

    .tag {
      font-weight: bold;
      font-size: 9px;
      padding: 1px 4px;
      border-radius: 3px;
      margin-right: 4px;
    }

    .tag-short {
      background: #ffe6e6;
      color: #cc0000;
    }

    .tag-video {
      background: #e6f2ff;
      color: #0066cc;
    }

    .tag-search {
      background: #fef3c7;
      color: #d97706;
    }

    #deleteSelected {
      width: 100%;
      margin-top: 12px;
      padding: 10px;
      background: #dc3545;
      color: white;
      border: none;
      border-radius: 4px;
      font-weight: bold;
      cursor: pointer;
    }

    #deleteSelected:hover {
      background: #c82333;
    }

    #statusLogger {
      margin-top: 10px;
      background: #222;
      color: #00ff00;
      font-family: 'Courier New', monospace;
      font-size: 11px;
      padding: 8px;
      border-radius: 4px;
      max-height: 60px;
      overflow-y: auto;
    }
  </style>
</head>

<body>
  <h3>Feed Sanitizer ✨☕</h3>

  <!-- Tabs Filter Container -->
  <div class="filter-container">
    <button class="filter-btn" id="showAll">All</button>
    <button class="filter-btn" id="showShorts">Shorts</button>
    <button class="filter-btn" id="showVideos">Videos</button>
    <button class="filter-btn" id="showSearches">Searches</button>
  </div>

  <div class="selection-container">
    <button class="selection-btn" id="selectAll">☑️ Select All Visible</button>
    <button class="selection-btn" id="clearAll">⬜ Clear All Selection</button>
    <button id="loadMoreBtn"
      style="background-color: #0288d1; color: white; padding: 6px 10px; border: none; border-radius: 4px; cursor: pointer; font-size: 11px; font-weight: bold; margin-left: 5px;">
      🔄 Load Next Batch
    </button>
  </div>

  <div id="videoList">Loading pipeline...</div>

  <button id="deleteSelected">Nuke Selected Items</button>

  <div id="statusLogger">> Engine Idle. Ready to audit.</div>

  <script src="popup.js"></script>
</body>

</html>
